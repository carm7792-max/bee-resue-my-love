<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>BEE RESCUE – Edición Aniversario</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#111;
  overflow:hidden;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
}
#wrap{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:relative;
  z-index:1;
}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  z-index:30;pointer-events:none;
}
.hbtn{
  pointer-events:all;
  background:rgba(10,10,10,.82);
  border:1.8px solid rgba(255,210,0,.55);
  color:rgba(255,210,0,.92);
  font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:900;
  letter-spacing:.8px;padding:5px 13px;
  border-radius:20px;cursor:pointer;
  transition:all .1s;
  -webkit-tap-highlight-color:transparent;
}
.hbtn:active{background:rgba(255,210,0,.22);color:#fff;border-color:rgba(255,210,0,.95);}
#lvlLabel{
  color:rgba(255,220,80,.95);
  font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:900;
  letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,210,0,.5);
}

/* ── D-PAD ── */
#dpad{
  position:fixed;bottom:0;left:0;right:0;
  height:180px;pointer-events:none;z-index:30;
}
#dpad-l{position:absolute;bottom:22px;left:14px;display:flex;gap:10px;pointer-events:all;}
#dpad-r{position:absolute;bottom:22px;right:14px;display:flex;gap:10px;pointer-events:all;}
.dbtn{
  width:74px;height:74px;border-radius:16px;
  background:rgba(255,210,0,.11);
  border:2px solid rgba(255,210,0,.36);
  color:rgba(255,210,0,.8);
  font-size:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .07s,border-color .07s,transform .07s;
  touch-action:none;
}
.dbtn.on{
  background:rgba(255,210,0,.36);
  border-color:rgba(255,210,0,.95);
  color:#fff;transform:scale(.91);
}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<div id="topbar">
  <button class="hbtn" id="btnMenu">⌂ INICIO</button>
  <span id="lvlLabel">BEE RESCUE</span>
  <button class="hbtn" id="btnRestart">↺ REINICIAR</button>
</div>

<div id="dpad">
  <div id="dpad-l">
    <div class="dbtn" id="dL">&#9664;</div>
    <div class="dbtn" id="dR">&#9654;</div>
  </div>
  <div id="dpad-r">
    <div class="dbtn" id="dU">&#9650;</div>
    <div class="dbtn" id="dD">&#9660;</div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════════
   CANVAS & SCALE
══════════════════════════════════════════════════ */
const GW=480,GH=270;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let scale=1;
function resize(){
  const ww=window.innerWidth,wh=window.innerHeight;
  scale=Math.min(ww/GW,wh/GH);
  canvas.width=GW;canvas.height=GH;
  canvas.style.width=(GW*scale)+'px';
  canvas.style.height=(GH*scale)+'px';
}
window.addEventListener('resize',resize,{passive:true});resize();

/* ══════════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════════ */
const K={u:0,d:0,l:0,r:0};
function bindBtn(id,dir){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();K[dir]=1;el.classList.add('on');};
  const off=e=>{e.preventDefault();K[dir]=0;el.classList.remove('on');};
  el.addEventListener('pointerdown',on,{passive:false});
  el.addEventListener('pointerup',off,{passive:false});
  el.addEventListener('pointercancel',off,{passive:false});
  el.addEventListener('pointerleave',off,{passive:false});
}
bindBtn('dL','l');bindBtn('dR','r');bindBtn('dU','u');bindBtn('dD','d');
window.addEventListener('keydown',e=>{
  if(['ArrowUp','w','W'].includes(e.key))K.u=1;
  if(['ArrowDown','s','S'].includes(e.key))K.d=1;
  if(['ArrowLeft','a','A'].includes(e.key))K.l=1;
  if(['ArrowRight','d','D'].includes(e.key))K.r=1;
},{passive:true});
window.addEventListener('keyup',e=>{
  if(['ArrowUp','w','W'].includes(e.key))K.u=0;
  if(['ArrowDown','s','S'].includes(e.key))K.d=0;
  if(['ArrowLeft','a','A'].includes(e.key))K.l=0;
  if(['ArrowRight','d','D'].includes(e.key))K.r=0;
},{passive:true});
function resetInput(){K.u=K.d=K.l=K.r=0;}
document.getElementById('btnMenu').addEventListener('pointerdown',e=>{e.preventDefault();goMenu();},{passive:false});
document.getElementById('btnRestart').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(currentLevel>0)startLevel(currentLevel);else goMenu();
},{passive:false});

/* ══════════════════════════════════════════════════
   AABB
══════════════════════════════════════════════════ */
function hit(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}
function resolve(mover,wall){
  const ox=Math.min(mover.x+mover.w,wall.x+wall.w)-Math.max(mover.x,wall.x);
  const oy=Math.min(mover.y+mover.h,wall.y+wall.h)-Math.max(mover.y,wall.y);
  if(ox<=0||oy<=0)return null;
  return ox<oy?{ox:mover.x<wall.x?-ox:ox,oy:0}:{ox:0,oy:mover.y<wall.y?-oy:oy};
}

/* ══════════════════════════════════════════════════
   BEE DRAWING (shared)
══════════════════════════════════════════════════ */
function drawBeeAt(cx,cy,faceDir,wingT,sz,isGirlfriend){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(faceDir,1);
  const s=sz||1;
  ctx.scale(s,s);

  // wings flap
  const wf=Math.sin(wingT*.9)*5;

  // wing top
  ctx.fillStyle=isGirlfriend?'rgba(255,200,220,.78)':'rgba(180,228,255,.72)';
  ctx.strokeStyle=isGirlfriend?'rgba(200,80,120,.45)':'rgba(80,140,200,.45)';
  ctx.lineWidth=.7;
  ctx.beginPath();ctx.ellipse(-1,-9+wf,9,5.5,-.25,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(-.5,-3+wf*.6,7,4,.3,0,Math.PI*2);ctx.fill();ctx.stroke();

  // stinger
  ctx.fillStyle='#e8a000';
  ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-15,-1);ctx.lineTo(-11,2);ctx.closePath();ctx.fill();

  // body
  ctx.fillStyle=isGirlfriend?'#ffb3c1':'#f5c800';
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,0,10,7.5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  // stripes
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(-4,-4.5,5,2.5);ctx.fillRect(-4,-.5,5,2.5);

  // head
  ctx.fillStyle=isGirlfriend?'#ffb3c1':'#f5c800';
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(10,-1,6,0,Math.PI*2);ctx.fill();ctx.stroke();

  // eye
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(12,-2,1.9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(12.6,-2.6,.65,0,Math.PI*2);ctx.fill();

  // girlfriend bow
  if(isGirlfriend){
    ctx.fillStyle='#e84070';
    ctx.beginPath();
    ctx.moveTo(10,-8);ctx.bezierCurveTo(13,-11,16,-9,10,-7);
    ctx.bezierCurveTo(14,-9,17,-7,10,-8);
    ctx.fill();
  }

  // antenna
  ctx.strokeStyle='#222';ctx.lineWidth=.9;
  ctx.beginPath();ctx.moveTo(9,-6);ctx.bezierCurveTo(10,-9,12,-9.5,12,-10);ctx.stroke();
  ctx.fillStyle=isGirlfriend?'#ff80aa':'#e84050';
  ctx.beginPath();ctx.arc(12,-10,1.7,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

/* ══════════════════════════════════════════════════
   SPIDER CLASS
══════════════════════════════════════════════════ */
class Spider{
  constructor(cx,cy,spd,range){
    this.w=18;this.h=16;
    this.cx=cx;this.cy=cy;
    this.spd=spd;this.range=range;
    this.t=Math.random()*Math.PI*2;
    this.pulse=Math.random()*Math.PI*2;
    this.x=cx-9;this.y=cy-8;
  }
  update(dt){
    this.t+=dt*this.spd*0.038;
    this.pulse+=dt*0.07;
    this.y=this.cy-this.h/2+Math.sin(this.t)*this.range;
    this.x=this.cx-this.w/2;
  }
  hitbox(){return{x:this.x+3,y:this.y+3,w:this.w-6,h:this.h-6};}
  draw(camX){
    const sx=this.x-camX,sy=this.y;
    if(sx+this.w<-4||sx>GW+4)return;
    const bx=sx+this.w/2,by=sy+this.h/2;
    const ps=1+Math.sin(this.pulse)*.1;
    ctx.save();ctx.translate(bx,by);ctx.scale(ps,ps);
    ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.1;
    for(const s of[-1,1]){
      for(let i=0;i<4;i++){
        const fy=[-4,-1,2,5][i];
        ctx.beginPath();
        ctx.moveTo(s*3,fy);
        ctx.quadraticCurveTo(s*7,fy+1,s*10,fy+(i%2===0?-3:3));
        ctx.stroke();
      }
    }
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2-Math.PI/8;
      const r=i%2===0?6.5:5;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r+2):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r+2);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#e03030';
    ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(2,0);ctx.lineTo(0,3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-2,4);ctx.lineTo(2,4);ctx.lineTo(0,1);ctx.closePath();ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(0,-5,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e03030';
    ctx.beginPath();ctx.arc(-2,-6,1.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(2,-6,1.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════
   LEVEL BUILDER
══════════════════════════════════════════════════ */
const WLEN=[0,1200,1600,2000];
const FLOOR=20,CEIL=20,SAFE=140;

function buildLevel(lvl){
  const W=WLEN[lvl],H=GH;
  const walls=[],spiders=[];
  walls.push({x:0,y:0,w:W,h:CEIL});
  walls.push({x:0,y:H-FLOOR,w:W,h:FLOOR});

  if(lvl===1){
    [{x:210,y:H-90,w:65,h:12},{x:370,y:H-110,w:55,h:12},
     {x:520,y:H-80,w:75,h:12},{x:700,y:H-100,w:60,h:12},
     {x:860,y:H-82,w:70,h:12},{x:1020,y:H-105,w:60,h:12}]
    .forEach(l=>walls.push(l));
    [280,440,580,730,890,1050].forEach(x=>{
      if(x>SAFE)spiders.push(new Spider(x,H-FLOOR-9,.00001,0));
    });
  }else if(lvl===2){
    [{x:190,gY:65,g:72},{x:310,gY:85,g:68},{x:440,gY:60,g:75},
     {x:565,gY:95,g:65},{x:690,gY:70,g:72},{x:810,gY:80,g:68},
     {x:935,gY:58,g:75},{x:1060,gY:88,g:68},{x:1180,gY:68,g:72},
     {x:1320,gY:75,g:70},{x:1450,gY:62,g:74}]
    .forEach(p=>{
      const topH=p.gY-CEIL;
      const botY=p.gY+p.g,botH=H-botY-FLOOR;
      if(topH>0)walls.push({x:p.x,y:CEIL,w:22,h:topH});
      if(botH>0)walls.push({x:p.x,y:botY,w:22,h:botH});
    });
    [250,375,502,628,750,873,997,1120,1250,1385].forEach((x,i)=>{
      if(x>SAFE)spiders.push(new Spider(x,80+(i%3)*40,1.1+(i%3)*.35,30+(i%4)*12));
    });
  }else if(lvl===3){
    const PASS=60,SEG=88;
    const segs=Math.floor((W-200)/SEG);
    for(let i=0;i<segs;i++){
      const wx=100+i*SEG;
      if(wx>W-150)break;
      const pc=GH/2+Math.sin(i*.55)*46;
      const pt=Math.max(CEIL+8,pc-PASS/2);
      const pb=Math.min(GH-FLOOR-8,pc+PASS/2);
      const topH=pt-CEIL,botY=pb,botH=GH-FLOOR-pb;
      if(topH>2)walls.push({x:wx,y:CEIL,w:76,h:topH});
      if(botH>2)walls.push({x:wx,y:botY,w:76,h:botH});
      if(wx>SAFE){
        const scY=pt+(PASS/2);
        const avail=(PASS/2)-12;
        spiders.push(new Spider(wx+38,scY,1.8+(i%4)*.35,Math.max(4,avail)));
      }
    }
  }
  return{walls,spiders,W};
}

/* ══════════════════════════════════════════════════
   SKY PALETTES per level
══════════════════════════════════════════════════ */
const SKY=[
  null,
  {top:'#87ceeb',bot:'#e0f4ff',cloud:'rgba(255,255,255,.88)',ground:'#2b2b2b'},
  {top:'#ff9a5c',bot:'#ffd4a3',cloud:'rgba(255,230,190,.82)',ground:'#3a2a1a'},
  {top:'#6b3fa0',bot:'#ff7eb3',cloud:'rgba(255,200,230,.72)',ground:'#2a1a2e'},
];

/* ══════════════════════════════════════════════════
   DECORATIONS
══════════════════════════════════════════════════ */
const CLOUDS=Array.from({length:14},(_,i)=>({
  x:i*220+Math.random()*80,y:24+Math.random()*44,w:38+Math.random()*28,
}));
const FLOWERS=Array.from({length:30},(_,i)=>({
  x:i*85+Math.random()*40+20,c:Math.floor(Math.random()*3),
}));

/* ══════════════════════════════════════════════════
   SPEECH BUBBLES
══════════════════════════════════════════════════ */
const CRIES=['¡Auxilio!','¡Te necesito!','¡No te rindas!','¡Apúrate!'];
let bubble={text:'',x:GW,y:0,alpha:0,timer:0,next:180};

function updateBubble(dt){
  bubble.timer+=dt;
  if(bubble.timer>bubble.next){
    bubble.text=CRIES[Math.floor(Math.random()*CRIES.length)];
    bubble.x=GW+60;
    bubble.y=50+Math.random()*80;
    bubble.alpha=1;
    bubble.timer=0;
    bubble.next=200+Math.random()*160;
  }
  bubble.x-=0.7*dt;
  if(bubble.x<-120)bubble.alpha=Math.max(0,bubble.alpha-.03*dt);
}

function drawBubble(){
  if(bubble.alpha<=0||!bubble.text)return;
  ctx.save();
  ctx.globalAlpha=bubble.alpha;
  ctx.font='bold 9px Nunito,sans-serif';
  const tw=ctx.measureText(bubble.text).width;
  const bw=tw+16,bh=18,bx=bubble.x,by=bubble.y;
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.strokeStyle='rgba(200,100,120,.7)';ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.roundRect(bx,by,bw,bh,6);
  ctx.fill();ctx.stroke();
  // tail
  ctx.beginPath();
  ctx.moveTo(bx+bw-10,by+bh);
  ctx.lineTo(bx+bw-4,by+bh+7);
  ctx.lineTo(bx+bw-17,by+bh);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(200,100,120,.5)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(bx+bw-10,by+bh);
  ctx.lineTo(bx+bw-4,by+bh+7);
  ctx.stroke();
  ctx.fillStyle='#c0304a';
  ctx.fillText(bubble.text,bx+8,by+13);
  ctx.restore();
}

/* ══════════════════════════════════════════════════
   HEARTS RAIN
══════════════════════════════════════════════════ */
let hearts=[];
function spawnHearts(){
  hearts=Array.from({length:28},(_,i)=>({
    x:Math.random()*GW,y:-20-Math.random()*GH,
    vy:.55+Math.random()*1.1,sz:9+Math.random()*20,
    phase:Math.random()*Math.PI*2,
  }));
}
function updateHearts(dt){
  hearts.forEach(h=>{
    h.y+=h.vy*dt;
    h.x+=Math.sin(Date.now()*.001+h.phase)*.4;
    if(h.y>GH+24){h.y=-20;h.x=Math.random()*GW;}
  });
}
function drawHearts(){
  hearts.forEach(h=>{
    ctx.font=h.sz+'px serif';
    ctx.globalAlpha=.5+Math.sin(Date.now()*.003+h.phase)*.3;
    ctx.textAlign='center';
    ctx.fillText('❤️',h.x,h.y);
  });
  ctx.globalAlpha=1;ctx.textAlign='left';
}

/* ══════════════════════════════════════════════════
   KISS / WIN ANIMATION
══════════════════════════════════════════════════ */
let kiss={
  active:false,
  t:0,
  heroX:0,heroY:GH/2,
  girlX:GW,girlY:GH/2,
  heroWingT:0,girlWingT:0,
  heartPulse:0,
  phase:0, // 0=fly-in, 1=kiss, 2=show message
  done:false,
};

function startKiss(){
  kiss.active=true;
  kiss.t=0;kiss.phase=0;
  kiss.heroX=GW*.12;kiss.girlX=GW*.88;
  kiss.heroY=GH*.5;kiss.girlY=GH*.5;
  kiss.heartPulse=0;kiss.done=false;
  spawnHearts();
}

function updateKiss(dt){
  kiss.t+=dt;
  kiss.heroWingT+=dt*1.8;kiss.girlWingT+=dt*1.8;
  kiss.heartPulse+=dt*0.1;
  if(kiss.phase===0){
    // fly toward center
    const tx=GW/2-22,ty=GH/2;
    kiss.heroX+=(tx-kiss.heroX)*.04*dt;
    kiss.heroY+=(ty-kiss.heroY)*.04*dt;
    const tx2=GW/2+22;
    kiss.girlX+=(tx2-kiss.girlX)*.04*dt;
    kiss.girlY+=(ty-kiss.girlY)*.04*dt;
    if(Math.abs(kiss.heroX-tx)<4)kiss.phase=1;
  }
  updateHearts(dt);
}

function drawKiss(){
  // romantic dark background
  const bg=ctx.createRadialGradient(GW/2,GH/2,10,GW/2,GW/2,GW*.9);
  bg.addColorStop(0,'#3d1630');bg.addColorStop(1,'#0e050e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);

  drawHearts();

  // bees
  drawBeeAt(kiss.heroX,kiss.heroY,1,kiss.heroWingT,1.2,false);
  drawBeeAt(kiss.girlX,kiss.girlY,-1,kiss.girlWingT,1.2,true);

  // heart between them
  if(kiss.phase>=1){
    const hs=1+Math.sin(kiss.heartPulse)*.22;
    const hx=GW/2,hy=GH/2-20;
    ctx.save();
    ctx.translate(hx,hy);ctx.scale(hs,hs);
    ctx.font='28px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('❤️',0,0);
    ctx.restore();
  }

  // sparkles
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2+kiss.t*.01;
    const r=28+Math.sin(kiss.t*.04+i)*8;
    const sx=GW/2+Math.cos(a)*r,sy=GH/2+Math.sin(a)*r;
    ctx.fillStyle=`rgba(255,220,60,${.4+Math.sin(kiss.t*.05+i)*.3})`;
    ctx.beginPath();ctx.arc(sx,sy,2+Math.sin(kiss.t*.07+i),0,Math.PI*2);ctx.fill();
  }

  if(kiss.phase>=1){
    // main romantic message
    ctx.textAlign='center';

    // Outer glow box
    const bx=GW/2-138,by=GH/2+34,bw=276,bh=80;
    ctx.fillStyle='rgba(20,5,16,.85)';
    ctx.strokeStyle='rgba(255,180,210,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.fill();ctx.stroke();

    ctx.fillStyle='#f5c800';
    ctx.font='bold 17px Pacifico,cursive';
    ctx.fillText('Eres mi vínculo sin eras,',GW/2,by+26);

    ctx.fillStyle='#ffb3d1';
    ctx.font='bold 15px Pacifico,cursive';
    ctx.fillText('¡feliz 1/2 año! 🍯',GW/2,by+48);

    ctx.fillStyle='rgba(200,170,200,.7)';
    ctx.font='700 8px Nunito,sans-serif';
    ctx.fillText('↺ REINICIAR  ·  ⌂ INICIO',GW/2,by+68);
    ctx.textAlign='left';
  }
}

/* ══════════════════════════════════════════════════
   DRAW BG / WALLS / GOAL / HUD
══════════════════════════════════════════════════ */
function drawBG(cam,lvl){
  const pal=SKY[lvl]||SKY[1];
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,pal.top);g.addColorStop(1,pal.bot);
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  // clouds
  const cs=cam*.22;
  CLOUDS.forEach(c=>{
    const cx=((c.x-cs)%(GW+c.w+80)+GW+c.w+80)%(GW+c.w+80)-c.w;
    if(cx+c.w<-4||cx>GW+4)return;
    ctx.fillStyle=pal.cloud;
    ctx.beginPath();ctx.ellipse(cx+c.w*.5,c.y+7,c.w*.38,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+c.w*.3,c.y+9,c.w*.24,5.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+c.w*.72,c.y+10,c.w*.2,5,0,0,Math.PI*2);ctx.fill();
  });
  // flowers
  FLOWERS.forEach(f=>{
    const fx=f.x-cam;
    if(fx<-12||fx>GW+12)return;
    const fy=GH-FLOOR-8;
    ctx.strokeStyle='#4a7030';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx,fy+8);ctx.lineTo(fx,fy+1);ctx.stroke();
    ctx.fillStyle=['#e84050','#f5c800','#50b060'][f.c];
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2;
      ctx.beginPath();ctx.ellipse(fx+Math.cos(a)*3,fy+Math.sin(a)*3,2.5,2.5,a,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(fx,fy,1.8,0,Math.PI*2);ctx.fill();
  });
}

function drawWalls(walls,cam,lvl){
  const pal=SKY[lvl]||SKY[1];
  walls.forEach(w=>{
    const rx=w.x-cam;
    if(rx+w.w<0||rx>GW)return;
    const isBound=w.y===0||w.y===GH-FLOOR;
    if(isBound){
      ctx.fillStyle=pal.ground;ctx.fillRect(rx,w.y,w.w,w.h);
      ctx.fillStyle='#444';ctx.fillRect(rx,w.y,w.w,3);
    }else{
      ctx.fillStyle='#2b2b2b';ctx.fillRect(rx,w.y,w.w,w.h);
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(rx,w.y,2,w.h);ctx.fillRect(rx+w.w-2,w.y,2,w.h);
      ctx.fillStyle='rgba(255,255,255,.045)';
      for(let ry=w.y;ry<w.y+w.h;ry+=8)
        for(let rx2=0;rx2<w.w;rx2+=10){
          const off=(Math.floor(ry/8)%2)*5;
          ctx.fillRect(rx+(rx2+off)%w.w,ry,8,6);
        }
    }
  });
}

function drawGoal(lvl,cam,webAlpha){
  const W=WLEN[lvl];
  const gx=W-62-cam,gy=GH/2-32,gw=50,gh=58;
  if(gx+gw<-8||gx>GW+8)return;
  const cx=gx+gw/2,cy=gy+gh/2;
  const a=webAlpha===undefined?1:webAlpha;
  ctx.save();ctx.globalAlpha=a;
  // glow
  const gl=ctx.createRadialGradient(cx,cy,3,cx,cy,gw);
  gl.addColorStop(0,'rgba(255,210,0,.22)');gl.addColorStop(1,'rgba(255,210,0,0)');
  ctx.fillStyle=gl;ctx.fillRect(gx-10,gy-10,gw+20,gh+20);
  // strands
  ctx.strokeStyle='rgba(140,140,140,.62)';ctx.lineWidth=.7;
  for(let i=0;i<8;i++){
    const ang=(i/8)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*gw/2,cy+Math.sin(ang)*gh/2);ctx.stroke();
  }
  ctx.strokeStyle='rgba(160,160,160,.58)';
  for(let r=1;r<=5;r++){
    ctx.beginPath();ctx.ellipse(cx,cy,(gw/2)*(r/5),(gh/2)*(r/5),0,0,Math.PI*2);ctx.stroke();
  }
  // trapped girlfriend bee
  drawBeeAt(cx+3,cy,-1,Date.now()*.005,0.82,true);
  // heart above
  const hx=cx,hy=gy-14;
  ctx.fillStyle='#e84050';
  ctx.beginPath();
  ctx.moveTo(hx,hy+3);
  ctx.bezierCurveTo(hx,hy-3,hx-6,hy-3,hx-6,hy+1);
  ctx.bezierCurveTo(hx-6,hy+5,hx,hy+9,hx,hy+9);
  ctx.bezierCurveTo(hx,hy+9,hx+6,hy+5,hx+6,hy+1);
  ctx.bezierCurveTo(hx+6,hy-3,hx,hy-3,hx,hy+3);
  ctx.fill();
  ctx.restore();
}

function drawHUD(cam,worldW){
  const bx=6,by=22,bw=100,bh=6;
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#ddd';ctx.fillRect(bx,by,bw,bh);
  const prog=Math.min(1,(cam+GW*.4)/worldW);
  const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
  pg.addColorStop(0,'#f5c800');pg.addColorStop(1,'#ffaa00');
  ctx.fillStyle=pg;ctx.fillRect(bx,by,bw*prog,bh);
  ctx.strokeStyle='#999';ctx.lineWidth=.8;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#f5c800';
  ctx.beginPath();ctx.arc(bx+bw*prog,by+bh/2,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=.6;ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=.8;
  ctx.beginPath();ctx.arc(bx+bw,by+bh/2,4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx+bw-4,by+bh/2);ctx.lineTo(bx+bw+4,by+bh/2);
  ctx.moveTo(bx+bw,by+bh/2-4);ctx.lineTo(bx+bw,by+bh/2+4);
  ctx.stroke();
}

/* ══════════════════════════════════════════════════
   START SCREEN
══════════════════════════════════════════════════ */
function drawMenu(ts){
  // warm neutral sky
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#fff8f0');g.addColorStop(1,'#ffeedd');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);

  // soft clouds
  ctx.fillStyle='rgba(255,255,255,.9)';
  [[60,28,70],[180,22,55],[310,32,65],[420,25,50]].forEach(([x,y,w])=>{
    ctx.beginPath();ctx.ellipse(x+w*.5,y+7,w*.38,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+w*.3,y+9,w*.24,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+w*.72,y+10,w*.2,5,0,0,Math.PI*2);ctx.fill();
  });

  // ground
  ctx.fillStyle='#2b2b2b';ctx.fillRect(0,GH-FLOOR,GW,FLOOR);
  ctx.fillStyle='#444';ctx.fillRect(0,GH-FLOOR,GW,3);
  FLOWERS.slice(0,10).forEach(f=>{
    const fx=f.x%GW,fy=GH-FLOOR-8;
    ctx.strokeStyle='#4a7030';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx,fy+8);ctx.lineTo(fx,fy+1);ctx.stroke();
    ctx.fillStyle=['#e84050','#f5c800','#50b060'][f.c];
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;ctx.beginPath();ctx.ellipse(fx+Math.cos(a)*3,fy+Math.sin(a)*3,2.5,2.5,a,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(fx,fy,1.8,0,Math.PI*2);ctx.fill();
  });

  // hero bee left — flying, hopeful
  const heroY=GH*.52+Math.sin(ts*.0028)*10;
  drawBeeAt(44, heroY, 1, ts*.008, 1.3, false);

  // girlfriend bee right — sad, trapped in mini web
  const girlY=GH*.52+Math.sin(ts*.0028+1.2)*10;
  // tiny web behind her
  ctx.strokeStyle='rgba(120,120,120,.5)';ctx.lineWidth=.6;
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(GW-42,girlY);ctx.lineTo(GW-42+Math.cos(a)*18,girlY+Math.sin(a)*18);ctx.stroke();}
  for(let r=1;r<=3;r++){ctx.beginPath();ctx.ellipse(GW-42,girlY,(18*r/3),(18*r/3),0,0,Math.PI*2);ctx.stroke();}
  drawBeeAt(GW-42, girlY, -1, ts*.008, 1.3, true);
  // sad face / tears
  ctx.font='8px serif';ctx.fillText('😢',GW-36,girlY-20);

  // center card
  const cw=220,ch=128,cx2=GW/2-cw/2,cy2=GH/2-ch/2-8;
  ctx.fillStyle='rgba(255,255,252,.96)';
  ctx.strokeStyle='rgba(245,200,0,.7)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(cx2,cy2,cw,ch,14);ctx.fill();ctx.stroke();

  // title
  ctx.textAlign='center';
  ctx.font='bold 26px Pacifico,cursive';
  ctx.fillStyle='#f5c800';
  ctx.fillText('BEE RESCUE',GW/2+2,cy2+34);
  ctx.fillStyle='#1a1a1a';
  ctx.fillText('BEE RESCUE',GW/2,cy2+32);

  // subtitle lines
  ctx.font='700 8.5px Nunito,sans-serif';
  ctx.fillStyle='#c0304a';
  ctx.fillText('Hecho con amor para mi amor',GW/2,cy2+52);
  ctx.fillStyle='#888';
  ctx.font='700 7.5px Nunito,sans-serif';
  ctx.fillText('"Lo hice con amor, rescátame por favor"',GW/2,cy2+65);

  // divider
  ctx.strokeStyle='rgba(245,200,0,.4)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(cx2+20,cy2+72);ctx.lineTo(cx2+cw-20,cy2+72);ctx.stroke();

  // EMPEZAR button
  const bw=130,bh=32,bx=GW/2-65,by=cy2+82;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(bx+3,by+3,bw,bh);
  ctx.fillStyle='#f5c800';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#111';ctx.font='900 13px Nunito,sans-serif';
  ctx.fillText('▶  EMPEZAR',GW/2,by+21);

  ctx.font='700 7px Nunito,sans-serif';ctx.fillStyle='#aaa';
  ctx.fillText('Flechas del teclado · D-PAD táctil',GW/2,cy2+ch+8);
  ctx.textAlign='left';
}

/* ══════════════════════════════════════════════════
   OVERLAY SCREENS
══════════════════════════════════════════════════ */
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,.76)';ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  ctx.fillStyle='#e84050';ctx.font='bold 22px Pacifico,cursive';
  ctx.fillText('☠  ¡Fin del Juego!',GW/2,GH/2-14);
  ctx.fillStyle='#ccc';ctx.font='700 9px Nunito,sans-serif';
  ctx.fillText('Una araña te atrapó...',GW/2,GH/2+6);
  ctx.fillText('↺ REINICIAR  ·  ⌂ INICIO',GW/2,GH/2+22);
  ctx.textAlign='left';
}

function drawLevelClear(lvl){
  ctx.fillStyle='rgba(10,20,10,.84)';ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  ctx.fillStyle='#f5c800';ctx.font='bold 20px Pacifico,cursive';
  ctx.fillText('✓  ¡Nivel '+lvl+' Superado!',GW/2,GH/2-10);
  ctx.fillStyle='#bbb';ctx.font='700 9px Nunito,sans-serif';
  ctx.fillText('Presiona cualquier dirección...',GW/2,GH/2+8);
  ctx.textAlign='left';
}

/* ══════════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════════ */
let gs='MENU',currentLevel=0,lvlData=null,player=null,camX=0;
let rafId=null,lastTs=0;

function goMenu(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  resetInput();
  gs='MENU';currentLevel=0;lvlData=null;player=null;camX=0;
  kiss.active=false;
  document.getElementById('lvlLabel').textContent='BEE RESCUE';
  lastTs=performance.now();
  rafId=requestAnimationFrame(loop);
}

function startLevel(lvl){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  resetInput();
  currentLevel=lvl;
  lvlData=buildLevel(lvl);
  player={x:24,y:GH/2-9,w:20,h:18,wingT:0,face:1};
  camX=0;gs='PLAYING';
  kiss.active=false;
  document.getElementById('lvlLabel').textContent='NIVEL '+lvl+' / 3';
  lastTs=performance.now();
  rafId=requestAnimationFrame(loop);
}

/* ══════════════════════════════════════════════════
   GOAL RECT
══════════════════════════════════════════════════ */
function goalRect(lvl){
  return{x:WLEN[lvl]-62,y:GH/2-32,w:50,h:58};
}

/* ══════════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════════ */
let webAlpha=1;

function loop(ts){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTs)/16.67,3);
  lastTs=ts;
  ctx.clearRect(0,0,GW,GH);

  if(gs==='MENU'){drawMenu(ts);return;}

  // WIN = kiss animation
  if(gs==='WIN'){
    updateKiss(dt);
    drawKiss();
    return;
  }

  if(gs==='GAMEOVER'){
    drawBG(camX,currentLevel);
    drawWalls(lvlData.walls,camX,currentLevel);
    drawGoal(currentLevel,camX);
    lvlData.spiders.forEach(s=>s.draw(camX));
    if(player)drawBeeAt(player.x-camX+player.w/2,player.y+player.h/2,player.face,player.wingT,1,false);
    drawHUD(camX,lvlData.W);
    drawGameOver();
    return;
  }

  if(gs==='LEVELCLEAR'){
    drawBG(camX,currentLevel);
    drawWalls(lvlData.walls,camX,currentLevel);
    drawGoal(currentLevel,camX);
    if(player)drawBeeAt(player.x-camX+player.w/2,player.y+player.h/2,player.face,player.wingT,1,false);
    drawHUD(camX,lvlData.W);
    drawLevelClear(currentLevel);
    if(K.u||K.d||K.l||K.r){
      const nx=currentLevel+1;
      if(nx<=3)startLevel(nx);
      else{startKiss();gs='WIN';}
    }
    return;
  }

  // ── PLAYING ──────────────────────────────────────────
  let mvX=0,mvY=0;
  if(K.r){mvX=1;player.face=1;}
  if(K.l){mvX=-1;player.face=-1;}
  if(K.u)mvY=-1;if(K.d)mvY=1;
  if(mvX&&mvY){mvX*=.7071;mvY*=.7071;}
  const spd=2.3;
  const dx=mvX*spd*dt,dy=mvY*spd*dt;
  if(dx||dy)player.wingT+=dt*1.6;

  player.x+=dx;
  lvlData.walls.forEach(w=>{const r=resolve(player,w);if(r)player.x+=r.ox;});
  player.y+=dy;
  lvlData.walls.forEach(w=>{const r=resolve(player,w);if(r)player.y+=r.oy;});
  player.x=Math.max(0,Math.min(lvlData.W-player.w,player.x));
  player.y=Math.max(0,Math.min(GH-player.h,player.y));

  camX+=(player.x-GW*.35-camX)*.12;
  camX=Math.max(0,Math.min(lvlData.W-GW,camX));

  lvlData.spiders.forEach(s=>s.update(dt));
  updateBubble(dt);

  // goal check
  if(hit(player,goalRect(currentLevel))){
    if(currentLevel===3){startKiss();gs='WIN';}
    else gs='LEVELCLEAR';
    return;
  }

  // spider death
  const ph={x:player.x+4,y:player.y+4,w:player.w-8,h:player.h-8};
  for(const s of lvlData.spiders){
    if(hit(ph,s.hitbox())){gs='GAMEOVER';return;}
  }

  // ── RENDER ──
  drawBG(camX,currentLevel);
  drawWalls(lvlData.walls,camX,currentLevel);
  drawGoal(currentLevel,camX);
  lvlData.spiders.forEach(s=>s.draw(camX));
  drawBeeAt(player.x-camX+player.w/2,player.y+player.h/2,player.face,player.wingT,1,false);
  drawBubble();
  drawHUD(camX,lvlData.W);
}

/* ══════════════════════════════════════════════════
   MENU START BUTTON (canvas click)
══════════════════════════════════════════════════ */
canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(gs!=='MENU')return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)/scale;
  const my=(e.clientY-r.top)/scale;
  // recalculate button position same as drawMenu
  const cw=220,ch=128,cx2=GW/2-cw/2,cy2=GH/2-ch/2-8;
  const bw=130,bh=32,bx=GW/2-65,by=cy2+82;
  if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh)startLevel(1);
},{passive:false});

/* ══════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════ */
lastTs=performance.now();
rafId=requestAnimationFrame(loop);
</script>
